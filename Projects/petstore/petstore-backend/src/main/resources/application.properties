
spring.datasource.url=jdbc:postgresql://localhost:5432/petstore
spring.datasource.username=postgres
spring.datasource.password=admin
 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
 
server.port=3388
 
# ─── New: File upload settings ────────────────────────────────────────────────
 
# Folder where uploaded images are saved (relative to where you run the JAR).
# Change to an absolute path in production, e.g. /var/petstore/uploads
app.upload.dir=uploads
 
# Spring's built-in multipart limits.
# 5MB per file, 10MB per request (accommodates future multi-file uploads).
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ─── Email (Gmail SMTP) ────────────────────────────────────────────────────────
# Set MAIL_USERNAME and MAIL_PASSWORD as environment variables.
# MAIL_PASSWORD must be a Gmail App Password (not your real password).
# Generate one at: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
